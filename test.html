<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PicAnalysis — Unit Tests</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: monospace; background: #111; color: #ccc; padding: 20px; }
  h1 { margin-bottom: 12px; color: #fff; }
  .suite { margin: 12px 0; border-left: 3px solid #444; padding-left: 12px; }
  .suite-title { font-weight: bold; color: #aaa; margin-bottom: 4px; }
  .pass { color: #6c6; }
  .fail { color: #e66; }
  .summary { margin-top: 20px; padding: 12px; border: 1px solid #444; font-size: 16px; }
  .summary.all-pass { border-color: #6c6; color: #6c6; }
  .summary.has-fail { border-color: #e66; color: #e66; }
  .detail { color: #888; font-size: 12px; margin-left: 24px; }
</style>
</head>
<body>
<h1>PicAnalysis Unit Tests</h1>
<div id="output"></div>

<!-- Load source modules in dependency order -->
<script src="js/color.js"></script>
<script src="js/stats.js"></script>
<script src="js/analyzer.js"></script>
<script src="js/scene.js"></script>
<script src="js/strategy.js"></script>
<script src="js/adjuster.js"></script>
<script src="js/recolor.js"></script>
<script src="js/transfer.js"></script>
<script src="js/lang.js"></script>

<script>
(function () {
  var output = document.getElementById("output");
  var totalPass = 0;
  var totalFail = 0;
  var currentSuite = null;

  // ── Mini test framework ──

  function suite(name) {
    var div = document.createElement("div");
    div.className = "suite";
    div.innerHTML = '<div class="suite-title">' + name + "</div>";
    output.appendChild(div);
    currentSuite = div;
  }

  function assert(description, condition, detail) {
    var el = document.createElement("div");
    if (condition) {
      el.className = "pass";
      el.textContent = "  PASS  " + description;
      totalPass++;
    } else {
      el.className = "fail";
      el.textContent = "  FAIL  " + description;
      totalFail++;
      if (detail) {
        var d = document.createElement("div");
        d.className = "detail";
        d.textContent = detail;
        el.appendChild(d);
      }
    }
    currentSuite.appendChild(el);
  }

  function approx(a, b, eps) {
    if (eps === undefined) eps = 0.01;
    return Math.abs(a - b) < eps;
  }

  function arrApprox(a, b, eps) {
    if (a.length !== b.length) return false;
    for (var i = 0; i < a.length; i++) {
      if (!approx(a[i], b[i], eps)) return false;
    }
    return true;
  }

  // Helper: create a flat RGBA image from pixel array [[r,g,b,a], ...]
  function makeImageData(w, h, pixels) {
    var data = new Uint8ClampedArray(w * h * 4);
    for (var i = 0; i < pixels.length; i++) {
      data[i * 4]     = pixels[i][0];
      data[i * 4 + 1] = pixels[i][1];
      data[i * 4 + 2] = pixels[i][2];
      data[i * 4 + 3] = pixels[i][3] !== undefined ? pixels[i][3] : 255;
    }
    return new ImageData(data, w, h);
  }

  // Helper: create uniform color image
  function uniformImage(w, h, r, g, b) {
    var pixels = [];
    for (var i = 0; i < w * h; i++) pixels.push([r, g, b, 255]);
    return makeImageData(w, h, pixels);
  }

  var Color = PicAnalysis.Color;
  var Stats = PicAnalysis.Stats;
  var Analyzer = PicAnalysis.Analyzer;
  var Scene = PicAnalysis.Scene;
  var Strategy = PicAnalysis.Strategy;
  var Adjuster = PicAnalysis.Adjuster;
  var Recolor = PicAnalysis.Recolor;
  var Transfer = PicAnalysis.Transfer;
  var Lang = PicAnalysis.Lang;

  // ════════════════════════════════════════════════
  // 1. Color.js
  // ════════════════════════════════════════════════

  suite("Color — clamp");
  assert("clamp(5,0,10) = 5", Color.clamp(5, 0, 10) === 5);
  assert("clamp(-3,0,10) = 0", Color.clamp(-3, 0, 10) === 0);
  assert("clamp(15,0,10) = 10", Color.clamp(15, 0, 10) === 10);
  assert("clamp(0,0,0) = 0", Color.clamp(0, 0, 0) === 0);

  suite("Color — luminance");
  assert("luminance(255,255,255) ≈ 255", approx(Color.luminance(255, 255, 255), 255, 0.1));
  assert("luminance(0,0,0) = 0", Color.luminance(0, 0, 0) === 0);
  assert("luminance(255,0,0) ≈ 76.245", approx(Color.luminance(255, 0, 0), 76.245, 0.01));
  assert("luminance(0,255,0) ≈ 149.685", approx(Color.luminance(0, 255, 0), 149.685, 0.01));
  assert("luminance(0,0,255) ≈ 29.07", approx(Color.luminance(0, 0, 255), 29.07, 0.01));

  suite("Color — RGB ↔ HSL roundtrip");
  (function () {
    var testColors = [
      [255, 0, 0],     // red
      [0, 255, 0],     // green
      [0, 0, 255],     // blue
      [255, 255, 0],   // yellow
      [128, 128, 128], // gray
      [0, 0, 0],       // black
      [255, 255, 255], // white
      [200, 100, 50],  // arbitrary warm
    ];
    for (var i = 0; i < testColors.length; i++) {
      var c = testColors[i];
      var hsl = Color.rgbToHsl(c[0], c[1], c[2]);
      var back = Color.hslToRgb(hsl[0], hsl[1], hsl[2]);
      var ok = Math.abs(back[0] - c[0]) <= 1 &&
               Math.abs(back[1] - c[1]) <= 1 &&
               Math.abs(back[2] - c[2]) <= 1;
      assert("roundtrip [" + c + "] → HSL → RGB", ok,
        "got [" + back + "] expected [" + c + "]");
    }
  })();

  suite("Color — HSL known values");
  (function () {
    var hsl = Color.rgbToHsl(255, 0, 0);
    assert("red hue ≈ 0", approx(hsl[0], 0, 0.01));
    assert("red saturation = 1", approx(hsl[1], 1, 0.01));
    assert("red lightness ≈ 0.5", approx(hsl[2], 0.5, 0.01));

    var hsl2 = Color.rgbToHsl(128, 128, 128);
    assert("gray saturation = 0", hsl2[1] === 0);
    assert("gray lightness ≈ 0.502", approx(hsl2[2], 128 / 255, 0.01));
  })();

  suite("Color — RGB ↔ LAB roundtrip");
  (function () {
    var testColors = [
      [255, 0, 0], [0, 255, 0], [0, 0, 255],
      [255, 255, 255], [0, 0, 0], [128, 128, 128],
      [200, 150, 100], [50, 100, 200],
    ];
    for (var i = 0; i < testColors.length; i++) {
      var c = testColors[i];
      var lab = Color.rgbToLab(c[0], c[1], c[2]);
      var back = Color.labToRgb(lab[0], lab[1], lab[2]);
      var ok = Math.abs(back[0] - c[0]) <= 1 &&
               Math.abs(back[1] - c[1]) <= 1 &&
               Math.abs(back[2] - c[2]) <= 1;
      assert("roundtrip [" + c + "] → LAB → RGB", ok,
        "got [" + back + "] expected [" + c + "]");
    }
  })();

  suite("Color — LAB known values");
  (function () {
    var lab = Color.rgbToLab(255, 255, 255);
    assert("white L* ≈ 100", approx(lab[0], 100, 0.5));
    assert("white a* ≈ 0", approx(lab[1], 0, 0.5));
    assert("white b* ≈ 0", approx(lab[2], 0, 0.5));

    var lab2 = Color.rgbToLab(0, 0, 0);
    assert("black L* ≈ 0", approx(lab2[0], 0, 0.5));
  })();

  // ════════════════════════════════════════════════
  // 2. Stats.js
  // ════════════════════════════════════════════════

  suite("Stats — mean");
  assert("mean([1,2,3,4,5]) = 3", Stats.mean([1, 2, 3, 4, 5]) === 3);
  assert("mean([]) = 0", Stats.mean([]) === 0);
  assert("mean([10]) = 10", Stats.mean([10]) === 10);
  assert("mean([0,0,0]) = 0", Stats.mean([0, 0, 0]) === 0);

  suite("Stats — std");
  assert("std([1,1,1]) = 0", Stats.std([1, 1, 1]) === 0);
  assert("std([]) = 0", Stats.std([]) === 0);
  assert("std([0,10]) ≈ 5", approx(Stats.std([0, 10]), 5, 0.01));
  assert("std([2,4,4,4,5,5,7,9]) ≈ 2", approx(Stats.std([2, 4, 4, 4, 5, 5, 7, 9]), 2, 0.01));

  suite("Stats — skewness");
  assert("skewness([1,1,1]) = 0", Stats.skewness([1, 1, 1]) === 0);
  assert("skewness([]) = 0", Stats.skewness([]) === 0);
  (function () {
    // A right-skewed distribution
    var arr = [1, 1, 1, 1, 1, 1, 1, 10];
    var sk = Stats.skewness(arr);
    assert("right-skewed data has positive skewness", sk > 0,
      "skewness = " + sk);
  })();

  suite("Stats — percentile");
  assert("percentile([1,2,3,4,5], 0) = 1", Stats.percentile([1, 2, 3, 4, 5], 0) === 1);
  assert("percentile([1,2,3,4,5], 100) = 5", Stats.percentile([1, 2, 3, 4, 5], 100) === 5);
  assert("percentile([1,2,3,4,5], 50) = 3", Stats.percentile([1, 2, 3, 4, 5], 50) === 3);
  assert("percentile([], 50) = 0", Stats.percentile([], 50) === 0);
  (function () {
    var p25 = Stats.percentile([1, 2, 3, 4, 5], 25);
    assert("percentile([1..5], 25) = 2", approx(p25, 2, 0.01));
  })();

  suite("Stats — histogram");
  (function () {
    var h = Stats.histogram([0, 1, 2, 3, 4], 5, 0, 4);
    assert("histogram has 5 bins", h.length === 5);
    var total = 0;
    for (var i = 0; i < h.length; i++) total += h[i];
    assert("histogram total = 5", total === 5);
  })();

  suite("Stats — kMeans");
  (function () {
    // Two clear clusters
    var points = [];
    for (var i = 0; i < 50; i++) points.push([10, 10, 10]);
    for (var i = 0; i < 50; i++) points.push([200, 200, 200]);
    var clusters = Stats.kMeans(points, 2);
    assert("kMeans returns 2 clusters", clusters.length === 2);
    assert("kMeans cluster sizes sum to 100",
      clusters[0].count + clusters[1].count === 100);
    // Centers should be near [10,10,10] and [200,200,200]
    var centers = clusters.map(function (c) { return c.center; }).sort(function (a, b) { return a[0] - b[0]; });
    assert("kMeans dark cluster center ≈ [10,10,10]",
      approx(centers[0][0], 10, 2) && approx(centers[0][1], 10, 2));
    assert("kMeans bright cluster center ≈ [200,200,200]",
      approx(centers[1][0], 200, 2) && approx(centers[1][1], 200, 2));
  })();
  (function () {
    assert("kMeans([]) returns []", Stats.kMeans([], 3).length === 0);
    var single = Stats.kMeans([[5, 5, 5]], 3);
    assert("kMeans with fewer points than k works", single.length === 1);
  })();

  // ════════════════════════════════════════════════
  // 3. Analyzer.js
  // ════════════════════════════════════════════════

  suite("Analyzer — uniform gray image");
  (function () {
    var img = uniformImage(9, 9, 128, 128, 128);
    var d = Analyzer.analyze(img);
    assert("returns diagnosis object", d && typeof d === "object");
    assert("luminance.mean ≈ 128", approx(d.luminance.mean, 128, 1));
    assert("luminance.std ≈ 0", approx(d.luminance.std, 0, 1));
    assert("saturation.mean ≈ 0", approx(d.saturation.mean, 0, 0.01));
    assert("colorTempBias ≈ 0", approx(d.colorTempBias, 0, 0.01));
    assert("tintBias ≈ 0", approx(d.tintBias, 0, 0.01));
    assert("dynamicRange ≈ 0", approx(d.luminance.dynamicRange, 0, 1));
    assert("luminance.p25 ≈ 128", approx(d.luminance.p25, 128, 1));
    assert("luminance.p75 ≈ 128", approx(d.luminance.p75, 128, 1));
    assert("luminance.midtoneRange ≈ 0", approx(d.luminance.midtoneRange, 0, 1));
    assert("has 9 regions", d.regions.length === 9);
    assert("regionSummary exists", d.regionSummary && typeof d.regionSummary.regionContrast === "number");
    assert("regionContrast ≈ 0", approx(d.regionSummary.regionContrast, 0, 1));
    assert("regionSummary.centerLum is number", typeof d.regionSummary.centerLum === "number");
    assert("regionSummary.edgeLumMean is number", typeof d.regionSummary.edgeLumMean === "number");
    assert("regionSummary.centerEdgeDiff ≈ 0", approx(d.regionSummary.centerEdgeDiff, 0, 1));
    assert("colorHarmony type is neutral", d.colorHarmony.type === "neutral");
    assert("dominantColors exists", Array.isArray(d.dominantColors));
    assert("pixelCount = 81", d.pixelCount === 81);
    assert("width = 9", d.width === 9);
    assert("channels exist", d.channels && typeof d.channels.rMean === "number");
  })();

  suite("Analyzer — midtone range reflects IQR");
  (function () {
    // Mostly mid-gray with a few extremes — IQR stays narrow while full range widens
    var pixels = [];
    for (var i = 0; i < 5; i++) pixels.push([20, 20, 20, 255]);
    for (var i = 0; i < 71; i++) pixels.push([120, 120, 120, 255]);
    for (var i = 0; i < 5; i++) pixels.push([230, 230, 230, 255]);
    var img = makeImageData(9, 9, pixels);
    var d = Analyzer.analyze(img);
    assert("midtoneRange < 50 (flat midtones)", d.luminance.midtoneRange < 50,
      "midtoneRange = " + d.luminance.midtoneRange);
    assert("dynamicRange > midtoneRange",
      d.luminance.dynamicRange > d.luminance.midtoneRange);
  })();

  suite("Analyzer — warm image (red dominant)");
  (function () {
    var img = uniformImage(9, 9, 220, 100, 80);
    var d = Analyzer.analyze(img);
    assert("colorTempBias > 0 (warm)", d.colorTempBias > 0,
      "colorTempBias = " + d.colorTempBias);
    assert("saturation.mean > 0", d.saturation.mean > 0);
  })();

  suite("Analyzer — cool image (blue dominant)");
  (function () {
    var img = uniformImage(9, 9, 80, 100, 220);
    var d = Analyzer.analyze(img);
    assert("colorTempBias < 0 (cool)", d.colorTempBias < 0,
      "colorTempBias = " + d.colorTempBias);
  })();

  suite("Analyzer — dark image");
  (function () {
    var img = uniformImage(9, 9, 20, 20, 20);
    var d = Analyzer.analyze(img);
    assert("luminance.mean < 30", d.luminance.mean < 30);
  })();

  suite("Analyzer — bright image");
  (function () {
    var img = uniformImage(9, 9, 240, 240, 240);
    var d = Analyzer.analyze(img);
    assert("luminance.mean > 220", d.luminance.mean > 220);
  })();

  suite("Analyzer — high contrast image");
  (function () {
    // Half black, half white
    var pixels = [];
    for (var i = 0; i < 40; i++) pixels.push([0, 0, 0, 255]);
    for (var i = 0; i < 41; i++) pixels.push([255, 255, 255, 255]);
    var img = makeImageData(9, 9, pixels);
    var d = Analyzer.analyze(img);
    assert("luminance.std > 100", d.luminance.std > 100,
      "std = " + d.luminance.std);
    assert("dynamicRange > 200", d.luminance.dynamicRange > 200);
  })();

  // ════════════════════════════════════════════════
  // 4. Scene.js
  // ════════════════════════════════════════════════

  suite("Scene — detect returns array of scene objects");
  (function () {
    var img = uniformImage(9, 9, 128, 128, 128);
    var d = Analyzer.analyze(img);
    var scenes = Scene.detect(d);
    assert("returns array", Array.isArray(scenes));
    assert("has entries", scenes.length > 0);
    assert("each scene has type", scenes[0].type && typeof scenes[0].type === "string");
    assert("each scene has confidence", typeof scenes[0].confidence === "number");
    assert("each scene has active flag", typeof scenes[0].active === "boolean");
    assert("each scene has factors", Array.isArray(scenes[0].factors));
  })();

  suite("Scene — dark image triggers lowKey");
  (function () {
    // Dark image with some range
    var pixels = [];
    for (var i = 0; i < 65; i++) pixels.push([25, 25, 25, 255]);
    for (var i = 0; i < 16; i++) pixels.push([80, 80, 80, 255]);
    var img = makeImageData(9, 9, pixels);
    var d = Analyzer.analyze(img);
    var scenes = Scene.detect(d);
    var lowKey = scenes.filter(function (s) { return s.type === "lowKey"; })[0];
    assert("lowKey scene exists", !!lowKey);
    assert("lowKey confidence > 0", lowKey.confidence > 0,
      "confidence = " + lowKey.confidence);
  })();

  suite("Scene — bright image triggers highKey");
  (function () {
    var pixels = [];
    for (var i = 0; i < 65; i++) pixels.push([230, 230, 230, 255]);
    for (var i = 0; i < 16; i++) pixels.push([180, 180, 180, 255]);
    var img = makeImageData(9, 9, pixels);
    var d = Analyzer.analyze(img);
    var scenes = Scene.detect(d);
    var highKey = scenes.filter(function (s) { return s.type === "highKey"; })[0];
    assert("highKey scene exists", !!highKey);
    assert("highKey confidence > 0", highKey.confidence > 0,
      "confidence = " + highKey.confidence);
  })();

  suite("Scene — desaturated image triggers desaturated");
  (function () {
    var img = uniformImage(9, 9, 130, 125, 128);
    var d = Analyzer.analyze(img);
    var scenes = Scene.detect(d);
    var desat = scenes.filter(function (s) { return s.type === "desaturated"; })[0];
    assert("desaturated scene exists", !!desat);
    assert("desaturated confidence > 0", desat.confidence > 0,
      "confidence = " + desat.confidence);
  })();

  suite("Scene — SCENE_TYPES constant");
  assert("SCENE_TYPES has 14 entries", Scene.SCENE_TYPES.length === 14);
  assert("CONFIDENCE_THRESHOLD = 0.3", Scene.CONFIDENCE_THRESHOLD === 0.3);
  (function () {
    var names = Scene.SCENE_TYPES;
    var required = [
      "lowKey", "highKey", "desaturated", "colorAccent", "warmTone",
      "coolTone", "highContrast", "silhouette", "softDreamy",
      "foggy", "goldenHour", "pastel", "neon", "portrait"
    ];
    for (var i = 0; i < required.length; i++) {
      assert("SCENE_TYPES contains '" + required[i] + "'",
        names.indexOf(required[i]) >= 0);
    }
  })();

  suite("Scene — neon image triggers neon scene");
  (function () {
    // Mix of bright cyan + dark blue: high sat, neon hues, high contrast
    var pixels = [];
    for (var i = 0; i < 40; i++) pixels.push([100, 255, 255, 255]); // bright cyan
    for (var i = 0; i < 41; i++) pixels.push([20, 20, 180, 255]);   // dark blue
    var img = makeImageData(9, 9, pixels);
    var d = Analyzer.analyze(img);
    var scenes = Scene.detect(d);
    var neon = scenes.filter(function (s) { return s.type === "neon"; })[0];
    assert("neon scene exists in detection output", !!neon);
    assert("neon confidence > 0.3 (active)", neon.confidence > 0.3,
      "confidence = " + neon.confidence);
  })();

  suite("Scene — scene output has 14 entries per call");
  (function () {
    var img = uniformImage(9, 9, 128, 128, 128);
    var d = Analyzer.analyze(img);
    var scenes = Scene.detect(d);
    assert("detect() returns 14 scene objects", scenes.length === 14);
  })();

  // ════════════════════════════════════════════════
  // 5. Strategy.js
  // ════════════════════════════════════════════════

  suite("Strategy — ADJUSTMENT_TYPES");
  (function () {
    var types = Strategy.ADJUSTMENT_TYPES;
    assert("has BRIGHTNESS", types.BRIGHTNESS === "brightness");
    assert("has CONTRAST", types.CONTRAST === "contrast");
    assert("has CONTRAST_REDUCTION", types.CONTRAST_REDUCTION === "contrastReduction");
    assert("has VIBRANCE", types.VIBRANCE === "vibrance");
    assert("has SATURATION", types.SATURATION === "saturation");
    assert("has DESATURATION", types.DESATURATION === "desaturation");
    assert("has WHITE_BALANCE", types.WHITE_BALANCE === "whiteBalance");
    assert("has TINT_CORRECTION", types.TINT_CORRECTION === "tintCorrection");
    assert("has SHADOW_RECOVERY", types.SHADOW_RECOVERY === "shadowRecovery");
    assert("has HIGHLIGHT_RECOVERY", types.HIGHLIGHT_RECOVERY === "highlightRecovery");
    assert("has CLARITY", types.CLARITY === "clarity");
    assert("has 11 types", Object.keys(types).length === 11);
  })();

  suite("Strategy — SCENE_MODIFIERS exported");
  (function () {
    var mods = Strategy.SCENE_MODIFIERS;
    assert("SCENE_MODIFIERS is object", mods && typeof mods === "object");
    assert("has lowKey modifier", mods.lowKey && typeof mods.lowKey === "object");
    assert("has highKey modifier", !!mods.highKey);
    assert("has desaturated modifier", !!mods.desaturated);
    assert("has neon modifier", !!mods.neon);
    assert("has pastel modifier", !!mods.pastel);
    assert("has colorAccent modifier", !!mods.colorAccent);
  })();

  suite("Strategy — defaultParams");
  (function () {
    var photo = Strategy.defaultParams("photo");
    assert("photo params has globalStrength", typeof photo.globalStrength === "number");
    assert("photo globalStrength = 1", photo.globalStrength === 1);
    assert("photo sceneAwareness = 0.85", approx(photo.sceneAwareness, 0.85, 0.01));
    assert("photo has clarityMinMidtoneRange", typeof photo.clarityMinMidtoneRange === "number");
    assert("photo clarityMinMidtoneRange > 0", photo.clarityMinMidtoneRange > 0);

    var illust = Strategy.defaultParams("illustration");
    assert("illustration params has globalStrength", typeof illust.globalStrength === "number");
    assert("illustration sceneAwareness = 0.9", approx(illust.sceneAwareness, 0.9, 0.01));
    assert("illustration has clarityMinMidtoneRange",
      typeof illust.clarityMinMidtoneRange === "number");
  })();

  suite("Strategy — flat midtones triggers clarity");
  (function () {
    // Uniform warm muted color: midtoneRange = 0, not desaturated
    var img = uniformImage(9, 9, 180, 100, 80);
    var d = Analyzer.analyze(img);
    assert("midtoneRange < clarityMinMidtoneRange",
      d.luminance.midtoneRange < Strategy.defaultParams("photo").clarityMinMidtoneRange,
      "midtoneRange=" + d.luminance.midtoneRange);
    var scenes = Scene.detect(d);
    var params = Strategy.defaultParams("photo");
    var adjs = Strategy.route(d, params, scenes, "photo");
    var clarity = adjs.filter(function (a) { return a.type === "clarity"; })[0];
    assert("clarity adjustment exists in output", !!clarity);
    assert("clarity is active on flat midtones", clarity.active === true,
      "active = " + clarity.active);
  })();

  suite("Strategy — wide midtones skips clarity");
  (function () {
    // Image with a wide IQR — quartiles spread across tonal range
    var pixels = [];
    // Balanced spread from 40 to 220 → wide IQR
    for (var i = 0; i < 20; i++) pixels.push([40, 40, 40, 255]);
    for (var i = 0; i < 21; i++) pixels.push([90, 90, 90, 255]);
    for (var i = 0; i < 20; i++) pixels.push([160, 160, 160, 255]);
    for (var i = 0; i < 20; i++) pixels.push([220, 220, 220, 255]);
    var img = makeImageData(9, 9, pixels);
    var d = Analyzer.analyze(img);
    var scenes = Scene.detect(d);
    var params = Strategy.defaultParams("photo");
    var adjs = Strategy.route(d, params, scenes, "photo");
    var clarity = adjs.filter(function (a) { return a.type === "clarity"; })[0];
    assert("clarity entry exists", !!clarity);
    assert("clarity is inactive when midtones spread wide",
      clarity.active === false || d.luminance.midtoneRange >= params.clarityMinMidtoneRange,
      "midtoneRange=" + d.luminance.midtoneRange + " active=" + clarity.active);

      maxDiff = Math.max(maxDiff,
        Math.abs(result.data[i] - img.data[i]),
        Math.abs(result.data[i + 1] - img.data[i + 1]),
        Math.abs(result.data[i + 2] - img.data[i + 2]));
    }
    assert("noRecolor leaves pixels within ≤1 channel", maxDiff <= 1,
      "maxDiff = " + maxDiff);
  })();

  suite("Recolor — warmShift pulls blue pixels toward warm");
  (function () {
    // Saturated blue source → warm shift should lift R and reduce B
    var img = uniformImage(9, 9, 40, 80, 220);
    var schemes = Recolor.generateSchemes(img);
    var warm = null;
    for (var i = 0; i < schemes.length; i++) {
      if (schemes[i].key === "warmShift") { warm = schemes[i].scheme; break; }
    }
    assert("warmShift scheme retrieved", !!warm);
    var result = Recolor.applyScheme(img, warm, 0, 0);
    assert("warmShift increases red channel", result.data[0] > img.data[0],
      "R " + img.data[0] + " → " + result.data[0]);
    assert("warmShift decreases blue channel", result.data[2] < img.data[2],
      "B " + img.data[2] + " → " + result.data[2]);
  })();

  suite("Recolor — coolShift pulls red pixels toward cool");
  (function () {
    var img = uniformImage(9, 9, 220, 80, 40);
    var schemes = Recolor.generateSchemes(img);
    var cool = null;
    for (var i = 0; i < schemes.length; i++) {
      if (schemes[i].key === "coolShift") { cool = schemes[i].scheme; break; }
    }
    assert("coolShift scheme retrieved", !!cool);
    var result = Recolor.applyScheme(img, cool, 0, 0);
    assert("coolShift decreases red channel", result.data[0] < img.data[0],
      "R " + img.data[0] + " → " + result.data[0]);
    assert("coolShift increases blue channel", result.data[2] > img.data[2],
      "B " + img.data[2] + " → " + result.data[2]);
  })();

  // ── Transfer: detailRetain, histogramShape, skinProtect effects ──
  suite("Transfer — detailRetain=1 returns (near) original target");
  (function () {
    var ref = uniformImage(3, 3, 60, 100, 200);
    var target = uniformImage(3, 3, 200, 120, 80);
    var profile = Transfer.buildProfile(ref);
    var result = Transfer.match(target, profile, { detailRetain: 1 });
    var maxDiff = 0;
    for (var i = 0; i < target.data.length; i += 4) {
      maxDiff = Math.max(maxDiff,
        Math.abs(result.data[i] - target.data[i]),
        Math.abs(result.data[i + 1] - target.data[i + 1]),
        Math.abs(result.data[i + 2] - target.data[i + 2]));
    }
    assert("detailRetain=1 keeps pixels within ≤1 channel", maxDiff <= 1,
      "maxDiff = " + maxDiff);
  })();

  suite("Transfer — histogramShape>0 shifts target luminance toward reference");
  (function () {
    // Dark target + bright reference → histogramShape should raise target lum
    var tpixels = [];
    for (var i = 0; i < 81; i++) tpixels.push([40, 40, 40, 255]);
    var target = makeImageData(9, 9, tpixels);
    var rpixels = [];
    for (var i = 0; i < 81; i++) rpixels.push([210, 210, 210, 255]);
    var ref = makeImageData(9, 9, rpixels);
    var profile = Transfer.buildProfile(ref);
    var res0 = Transfer.match(target, profile, {
      lumStrength: 0, colorStrength: 0, hueStrength: 0,
      histogramShape: 0, skinProtect: 0, overallStrength: 1
    });
    var res1 = Transfer.match(target, profile, {
      lumStrength: 0, colorStrength: 0, hueStrength: 0,
      histogramShape: 1, skinProtect: 0, overallStrength: 1
    });
    // res1 should be brighter than res0
    assert("histogramShape=1 produces brighter output than =0",
      res1.data[0] > res0.data[0],
      "res0=" + res0.data[0] + " res1=" + res1.data[0]);
  })();

  suite("Transfer — skinProtect reduces shift on skin-toned pixels");
  (function () {
    // Skin-toned target + drastically different (cool) reference
    var target = uniformImage(9, 9, 210, 170, 140);
    var ref = uniformImage(9, 9, 60, 90, 200);
    var profile = Transfer.buildProfile(ref);
    var noProtect = Transfer.match(target, profile, {
      lumStrength: 1, colorStrength: 1, hueStrength: 0.6,
      histogramShape: 0, skinProtect: 0, overallStrength: 1
    });
    var withProtect = Transfer.match(target, profile, {
      lumStrength: 1, colorStrength: 1, hueStrength: 0.6,
      histogramShape: 0, skinProtect: 1, overallStrength: 1
    });
    var noPDiff = Math.abs(noProtect.data[0] - target.data[0]) +
                  Math.abs(noProtect.data[1] - target.data[1]) +
                  Math.abs(noProtect.data[2] - target.data[2]);
    var wpDiff = Math.abs(withProtect.data[0] - target.data[0]) +
                 Math.abs(withProtect.data[1] - target.data[1]) +
                 Math.abs(withProtect.data[2] - target.data[2]);
    assert("skinProtect=1 yields smaller pixel shift than =0",
      wpDiff < noPDiff,
      "noProtect=" + noPDiff + " withProtect=" + wpDiff);
  })();

  // ════════════════════════════════════════════════
  // Summary
  // ════════════════════════════════════════════════

  var summaryDiv = document.createElement("div");
  summaryDiv.className = "summary " + (totalFail === 0 ? "all-pass" : "has-fail");
  summaryDiv.textContent = totalPass + " passed, " + totalFail + " failed — " +
    (totalPass + totalFail) + " total";
  output.appendChild(summaryDiv);

  // Log to console for automated checking
  console.log("TEST RESULTS: " + totalPass + " passed, " + totalFail + " failed");
  if (totalFail > 0) console.error("SOME TESTS FAILED");
})();
</script>
